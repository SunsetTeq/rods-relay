listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

rtc_server {
    enabled         on;
    listen          8000;
    candidate       $RELAY_RTC_CANDIDATE;
}

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
}

vhost __defaultVhost__ {
    min_latency     on;
    tcp_nodelay     on;

    play {
        gop_cache       off;
        queue_length    10;
        mw_latency      100;
    }

    publish {
        mr              off;
    }

    rtc {
        enabled         on;
        nack            on;
        twcc            on;
        rtmp_to_rtc     on;
        rtc_to_rtmp     off;
    }

    hls {
        enabled         on;
        hls_path        ./objs/nginx/html;
        hls_fragment    1;
        hls_window      10;
        hls_cleanup     on;
        hls_dispose     20;
        hls_ctx         off;
        hls_ts_ctx      off;
        hls_m3u8_file   [app]/[stream].m3u8;
        hls_ts_file     [app]/[stream]-[seq].ts;
    }
}
